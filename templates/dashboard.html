<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>总部管理看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-xl shadow-sm mb-6">
            <div class="mb-4 md:mb-0">
                <h1 class="text-2xl font-bold text-gray-800">总部反馈数据控制台</h1>
                <p class="text-gray-500 text-sm mt-1">这里汇集了全国门店提交的标准化反馈，支持一键导出以用于生成周报。</p>
            </div>
            <div class="flex gap-4">
                <a href="api/export" target="_blank" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    一键导出数据 (CSV/Excel)
                </a>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">实时收集流水 (最新50条)</h3>
                <span class="text-xs text-green-500 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-green-500 mr-1 animate-pulse"></span>
                    实时连接中
                </span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                            <th class="p-3 rounded-tl-lg">提报时间</th>
                            <th class="p-3">周期</th>
                            <th class="p-3">渠道</th>
                            <th class="p-3">门店</th>
                            <th class="p-3">趋势</th>
                            <th class="p-3">核心归因 (标准)</th>
                            <th class="p-3 rounded-tr-lg">详情说明</th>
                        </tr>
                    </thead>
                    <tbody id="recentList" class="text-sm">
                        <tr><td colspan="7" class="text-center p-10 text-gray-400">加载数据中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        function loadData() {
            fetch('api/report')
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('recentList');
                if(!data.recent || data.recent.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center p-10 text-gray-400">暂无门店提交数据</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                data.recent.forEach(item => {
                    const trendIcon = item.trend === 'Up' 
                        ? '<span class="text-green-600 font-bold bg-green-50 px-2 py-1 rounded">📈 增长</span>' 
                        : '<span class="text-red-600 font-bold bg-red-50 px-2 py-1 rounded">📉 下降</span>';
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-blue-50 transition">
                            <td class="p-3 text-gray-500 whitespace-nowrap">${item.time}</td>
                            <td class="p-3 font-mono text-xs text-gray-600">${item.period}</td>
                            <td class="p-3 text-gray-700">${item.channel}</td>
                            <td class="p-3 font-bold text-gray-800">${item.store_name}</td>
                            <td class="p-3">${trendIcon}</td>
                            <td class="p-3 text-blue-600 font-medium">${item.reason}</td>
                            <td class="p-3 text-gray-500 max-w-xs truncate" title="${item.detail}">${item.detail}</td>
                        </tr>
                    `;
                });
            });
        }
        
        loadData();
        setInterval(loadData, 3000);
    </script>
</body>
</html>
